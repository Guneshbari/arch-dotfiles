# Application bindings
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, $browser
bindd = SUPER SHIFT, B, Browser (private), exec, $browser --private
bindd = SUPER, M, Music, exec, zen-browser --new-tab "https://spotify.com"
bindd = SUPER, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, E, Gmail, exec, zen-browser --new-tab  Gmail "https://mail.google.com/"
bindd = SUPER, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyperland treat it as comments
bindd = SUPER, A, ChatGPT, exec, zen-browser --new-tab ChatGPT "https://chatgpt.com"
bindd = SUPER SHIFT, A, Claude, exec, zen-browser --new-tab Claude "https://claude.ai"
bindd = SUPER, C, Calendar, exec, zen-browser --new-tab "https://calendar.google.com/"
unbind = SUPER, W,
bindd = SUPER, Y, YouTube, exec, zen-browser --new-tab "https://youtube.com/"
bindd = SUPER, Q, Close window, exec, hyprctl dispatch killactive
bindd = SUPER SHIFT, W, WhatsApp, exec, zen-browser --new-tab WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT , G, Github, exec,  zen-browser --new-tab  Github "https://github.com/"
bindd = SUPER, X, NxtWave, exec, zen-browser --new-tab "https://learning.ccbp.in/"
bindd = SUPER SHIFT, V, VS Code, exec, code --reuse-window
# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu
