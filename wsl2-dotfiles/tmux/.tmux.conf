# ─────────────────────────────────────────────────────────────
#  Tmux Configuration — WSL2 (Arch Linux on Windows)
# ─────────────────────────────────────────────────────────────

# ── General ────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true-color support
set -g mouse on                                     # enable mouse
set -g history-limit 50000                           # scrollback buffer
set -sg escape-time 0                                # no delay for escape key
set -g focus-events on                               # focus events for vim
set -g set-clipboard on                              # OSC 52 clipboard

# ── Shell ──────────────────────────────────────────────────
set -g default-shell /usr/bin/zsh

# ── Numbering ─────────────────────────────────────────────
set -g base-index 1           # start windows at 1
setw -g pane-base-index 1     # start panes at 1
set -g renumber-windows on    # renumber on close

# ── Prefix ─────────────────────────────────────────────────
# Keep C-b, add C-a as secondary
set -g prefix C-b
set -g prefix2 C-a
bind C-a send-prefix -2

# ── Vi Mode ────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "clip.exe"

# ── Pane Splitting ─────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane Navigation (vim-style) ───────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane Resizing ──────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window Navigation ─────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Quick Actions ──────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "✓ Config reloaded"
bind X confirm-before -p "Kill session? (y/n)" kill-session
bind S command-prompt -p "New session name:" "new-session -s '%%'"

# ── Status Bar (Catppuccin Mocha) ──────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Colors (Catppuccin Mocha)
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left-length 30
set -g status-left "#[bg=#a6e3a1,fg=#1e1e2e,bold]  #S #[bg=#1e1e2e,fg=#a6e3a1]"

# Right: hostname + time
set -g status-right-length 60
set -g status-right "#[fg=#89b4fa]#[bg=#89b4fa,fg=#1e1e2e]  #H #[bg=#89b4fa,fg=#cba6f7]#[bg=#cba6f7,fg=#1e1e2e]  %H:%M #[bg=#cba6f7,fg=#fab387]#[bg=#fab387,fg=#1e1e2e]  %d-%b "

# Window tabs
setw -g window-status-format "#[fg=#1e1e2e,bg=#313244]#[bg=#313244,fg=#cdd6f4] #I:#W #[fg=#313244,bg=#1e1e2e]"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#fab387]#[bg=#fab387,fg=#1e1e2e,bold] #I:#W #[fg=#fab387,bg=#1e1e2e]"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#fab387"

# Message style
set -g message-style "bg=#fab387,fg=#1e1e2e"

# ── Plugins ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# WSL2: use clip.exe for tmux-yank
set -g @yank_selection_mouse 'clipboard'
set -g @override_copy_command 'clip.exe'

# ── TPM Bootstrap ─────────────────────────────────────────
# Auto-install TPM if not already present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
